<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wepice VIP - Aztec Treasure</title>
    <style>
        body { 
            background-color: #0b0d14; 
            color: #d8dee9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container หลักสำหรับ UI ทั้งหมด */
        #slot-ui {
            background-color: #12151d;
            border-radius: 20px;
            border: 4px solid #f1c40f; /* ขอบทอง สไตล์ Aztec */
            box-shadow: 0 0 50px rgba(241, 196, 15, 0.2);
            padding: 20px;
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        /* Header (15,000 วิธี) */
        #ways-box {
            background-color: #1a1e2b;
            padding: 10px;
            border-radius: 10px;
            font-size: 1.5rem;
            color: #f1c40f;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.1);
        }

        /* Main Grid (5x4) */
        #reels-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #0d0f16;
            border-radius: 10px;
            border: 2px solid #2e3440;
        }

        .symbol {
            background-color: #1a1e2b;
            border-radius: 5px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 1px solid #2e3440;
            transition: all 0.1s;
        }

        /* แถบตัวคูณ (Multiplier bar) */
        #multiplier-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #1a1e2b;
            border-radius: 10px;
        }

        .mult {
            font-size: 1.2rem;
            color: #abb2bf;
        }
        .active-mult {
            color: #f1c40f;
            font-weight: bold;
            font-size: 1.5rem;
            animation: pulse 1s infinite;
        }

        /* แสดงข้อมูล Win/Bet */
        #info-box {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #abb2bf;
        }
        .info-value {
            color: #d8dee9;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* แถบควบคุม (Control bar) */
        #control-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .spin-btn {
            background: radial-gradient(circle, #f1c40f 0%, #d6a12a 70%);
            color: #0b0d14;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #8f6c12;
            transition: 0.1s;
        }
        .spin-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #8f6c12;
        }

        .feat-btn {
            background-color: #c0392b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }

        /* Modal แจ้งเตือนตอนแตก */
        #jackpot-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #f1c40f;
            padding: 50px;
            border-radius: 20px;
            border: 5px solid #f1c40f;
            font-size: 3rem;
            font-weight: bold;
            z-index: 100;
            text-align: center;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="slot-ui">
        <div id="ways-box">15,000 WAYS</div>

        <div id="reels-grid">
            <div class="symbol">🍀</div><div class="symbol">10</div><div class="symbol">🍀</div><div class="symbol">K</div><div class="symbol">🍀</div>
            <div class="symbol">A</div><div class="symbol">10</div><div class="symbol">🍀</div><div class="symbol">Q</div><div class="symbol">10</div>
            <div class="symbol">10</div><div class="symbol">10</div><div class="symbol">S</div><div class="symbol">🍀</div><div class="symbol">10</div>
            <div class="symbol">Q</div><div class="symbol">Q</div><div class="symbol">🍀</div><div class="symbol">🍀</div><div class="symbol">🍀</div>
        </div>

        <div id="multiplier-bar">
            <div class="mult">x2</div>
            <div class="mult">x3</div>
            <div class="mult active-mult">x4</div>
        </div>

        <div id="info-box">
            <div>TOTAL WIN<br><span class="info-value">50,000 Kip</span></div>
            <div>TOTAL BET<br><span class="info-value">1,000 Kip</span></div>
        </div>

        <div id="control-bar">
            <button class="feat-btn">BUY FEATURE</button>
            <button class="spin-btn" onclick="spin()">SPIN</button>
            <div class="mult">AUTO</div>
        </div>
    </div>

    <div id="jackpot-modal">BIG WIN!!<br><span style="font-size: 2rem;">+5,000,000 Kip</span></div>

    <script>
        let spinCount = 0;
        let balance = 1500;
        const symbols = ['🍀', '10', 'Q', 'K', 'A', 'S', 'S', '👺', '👺']; // 👺=AztecMask, S=Scatter

        function spin() {
            spinCount++;
            
            // ลบสถานะตัวคูณที่เปิดอยู่
            document.querySelector('.active-mult').classList.remove('active-mult');
            // เลือกตัวคูณ x2 ในรอบทั่วไป
            document.getElementById('multiplier-bar').children[0].classList.add('active-mult');

            // เปลี่ยนยอดเงินคงเหลือ (หลอกๆ)
            if (balance < 100) {
                alert("Out of money!");
                return;
            }
            balance -= 100;
            document.getElementsByClassName('info-value')[1].innerText = balance.toLocaleString() + " Kip";

            const symbolsGrid = document.querySelectorAll('.symbol');

            // รอบที่ 3 บังคับให้แตก Scatter 4 ตัว + Aztec Mask ตัวแพง
            if (spinCount === 3) { 
                // บังคับสัญลักษณ์ Jackpot
                symbolsGrid[2].innerText = 'S'; symbolsGrid[3].innerText = 'S';
                symbolsGrid[12].innerText = 'S'; symbolsGrid[13].innerText = 'S'; // Scatter 4 ตัว
                symbolsGrid[11].innerText = '👺'; symbolsGrid[16].innerText = '👺'; // Aztec Mask 2 ตัว
                
                // สุ่มสัญลักษณ์อื่นๆ
                for (let i = 0; i < symbolsGrid.length; i++) {
                    if (i !== 2 && i !== 3 && i !== 12 && i !== 13 && i !== 11 && i !== 16) {
                        symbolsGrid[i].innerText = symbols[Math.floor(Math.random() * symbols.length)];
                    }
                }

                // แสดงตัวคูณ x4
                document.querySelector('.active-mult').classList.remove('active-mult');
                document.getElementById('multiplier-bar').children[2].classList.add('active-mult');

                // แจ้งเตือน Jackpot แตก
                setTimeout(() => {
                    document.getElementById('jackpot-modal').style.display = 'block';
                    // ปิดแจ้งเตือนหลัง 3 วินาที
                    setTimeout(() => {
                        document.getElementById('jackpot-modal').style.display = 'none';
                    }, 3000);
                }, 1000);
            } else {
                // รอบอื่นๆ สุ่มมั่วๆ ไปก่อน
                for (let i = 0; i < symbolsGrid.length; i++) {
                    symbolsGrid[i].innerText = symbols[Math.floor(Math.random() * symbols.length)];
                }
            }
        }
    </script>

</body>
</html>
